<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JobTrack Agent</title>
    <style>
      body {
        width: 220px;
        margin: 0;
        padding: 16px;
        background: #0d1117;
        color: #e2e8f0;
        text-align: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica,
          Arial, sans-serif;
      }
      .popup-logo {
        display: block;
        height: 56px;
        width: auto;
        margin: 0 auto 10px;
      }
      h1 {
        margin: 0 0 6px;
        font-size: 16px;
        color: #63b3ed;
      }
      p {
        margin: 0 0 8px;
        font-size: 13px;
        color: #94a3b8;
        line-height: 1.4;
      }
      .note {
        font-size: 12px;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <img class="popup-logo" src="icons/mark.png" alt="JobTrack Agent logo" />
    <h1>JobTrack Agent</h1>
    <p>Click the icon to open the side panel</p>
    <div class="note">Or use the panel already open →</div>
  </body>
</html>
