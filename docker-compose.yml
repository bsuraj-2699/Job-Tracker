services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: jobtrack-qdrant
    # Host ports 6533/6534 (not Qdrant's default 6333/6334) so jobtrack gets its
    # own instance even when another project already holds 6333 on this machine.
    # Container-internal ports stay 6333 (REST) / 6334 (gRPC). Keep QDRANT_PORT
    # in .env in sync with the REST host port below.
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_storage:
